name: Timeweb Publish

on:
  workflow_dispatch:
    inputs:
      service_image_lock_json:
        description: JSON platform_service_image_lock with digest-pinned service image refs.
        required: true
        type: string
      deploy_branch:
        description: Platform branch to publish when publish_deploy_branch is true.
        required: true
        default: timeweb-deploy
        type: string
      publish_deploy_branch:
        description: Publish the rendered manifest tree to deploy_branch.
        required: true
        default: false
        type: boolean
      release_commit:
        description: Release commit to embed in deployment metadata. Defaults to this workflow SHA.
        required: false
        type: string
      release_created_at:
        description: UTC release timestamp. Defaults to render time when empty.
        required: false
        type: string
      artifact_base_url:
        description: Static SpecGraph artifact base URL.
        required: true
        default: https://specgraph.tech
        type: string
      product_workspace_artifact_base_url:
        description: Optional explicit product workspace artifact binding. Empty uses the tracked Team Decision Log and Hosted Operation Canary workspace bundles.
        required: false
        type: string
      specpm_registry_url:
        description: Readonly SpecPM registry URL.
        required: true
        default: https://specpm.dev
        type: string
      hosted_managed_execution_enabled:
        description: Enable the durable hosted profile for Compose runtimes that support volumes and secrets.
        required: true
        default: false
        type: boolean
      hosted_managed_bounded_canary_enabled:
        description: Enable the Timeweb-compatible ephemeral review-status canary profile without volumes or Compose secrets.
        required: true
        default: false
        type: boolean
      hosted_managed_external_state_enabled:
        description: Enable the Timeweb-compatible persistent hosted profile backed by the external SpecSpace state service.
        required: true
        default: false
        type: boolean
      hosted_managed_executor_url:
        description: HTTPS Platform hosted managed-operation service origin.
        required: true
        default: https://managed.specgraph.tech
        type: string
      external_state_url:
        description: HTTPS external SpecSpace state service URL.
        required: true
        default: https://managed.specgraph.tech/specspace-state
        type: string

jobs:
  render-validate-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Write service image lock
        env:
          SERVICE_IMAGE_LOCK_JSON: ${{ inputs.service_image_lock_json }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ["SERVICE_IMAGE_LOCK_JSON"])
          Path("dist").mkdir(exist_ok=True)
          Path("dist/platform-service-images.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Render Timeweb deploy tree
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit || github.sha }}
          RELEASE_CREATED_AT: ${{ inputs.release_created_at }}
        run: >-
          python3 scripts/platform.py deploy timeweb-render
          --output-dir dist/platform-timeweb-deploy
          --image-lock dist/platform-service-images.json
          --artifact-base-url "${{ inputs.artifact_base_url }}"
          --product-workspace-artifact-base-url "${{ inputs.product_workspace_artifact_base_url }}"
          --specpm-registry-url "${{ inputs.specpm_registry_url }}"
          --hosted-managed-executor-url "${{ inputs.hosted_managed_executor_url }}"
          ${{ inputs.hosted_managed_execution_enabled && '--enable-hosted-managed-execution' || '--disable-hosted-managed-execution' }}
          ${{ inputs.hosted_managed_bounded_canary_enabled && '--enable-hosted-managed-bounded-canary' || '' }}
          ${{ inputs.hosted_managed_external_state_enabled && '--enable-hosted-managed-external-state' || '' }}
          --external-state-url "${{ inputs.external_state_url }}"
          --release-commit "${RELEASE_COMMIT}"
          --release-created-at "${RELEASE_CREATED_AT}"
          --format json

      - name: Validate Timeweb deploy tree
        run: >-
          python3 scripts/platform.py deploy timeweb-validate
          --path dist/platform-timeweb-deploy
          --artifact-base-url "${{ inputs.artifact_base_url }}"
          --product-workspace-artifact-base-url "${{ inputs.product_workspace_artifact_base_url }}"
          --specpm-registry-url "${{ inputs.specpm_registry_url }}"
          --hosted-managed-executor-url "${{ inputs.hosted_managed_executor_url }}"
          ${{ inputs.hosted_managed_execution_enabled && '--enable-hosted-managed-execution' || '--disable-hosted-managed-execution' }}
          ${{ inputs.hosted_managed_bounded_canary_enabled && '--enable-hosted-managed-bounded-canary' || '' }}
          ${{ inputs.hosted_managed_external_state_enabled && '--enable-hosted-managed-external-state' || '' }}
          --external-state-url "${{ inputs.external_state_url }}"

      - name: Validate Timeweb Compose config
        working-directory: dist/platform-timeweb-deploy
        env:
          SPECSPACE_HOSTED_MANAGED_EXECUTOR_TOKEN: ci-compose-secret-placeholder
          SPECSPACE_EXTERNAL_STATE_TOKEN: ci-external-state-secret-placeholder
        run: docker compose --file docker-compose.yml config

      - name: Upload rendered Timeweb deploy tree
        uses: actions/upload-artifact@v7
        with:
          name: platform-timeweb-deploy
          path: dist/platform-timeweb-deploy

      - name: Configure git identity
        if: inputs.publish_deploy_branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish Platform Timeweb deploy branch
        if: inputs.publish_deploy_branch
        env:
          PLATFORM_TIMEWEB_DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
          PLATFORM_RELEASE_COMMIT: ${{ inputs.release_commit || github.sha }}
          TIMEWEB_REQUIRED_ARTIFACT_BASE_URL: ${{ inputs.artifact_base_url }}
          TIMEWEB_REQUIRED_PRODUCT_WORKSPACE_ARTIFACT_BASE_URL: ${{ inputs.product_workspace_artifact_base_url }}
          TIMEWEB_REQUIRED_SPECPM_REGISTRY_URL: ${{ inputs.specpm_registry_url }}
          TIMEWEB_REQUIRED_HOSTED_MANAGED_EXECUTION_ENABLED: ${{ inputs.hosted_managed_execution_enabled }}
          TIMEWEB_REQUIRED_HOSTED_MANAGED_BOUNDED_CANARY_ENABLED: ${{ inputs.hosted_managed_bounded_canary_enabled }}
          TIMEWEB_REQUIRED_HOSTED_MANAGED_EXTERNAL_STATE_ENABLED: ${{ inputs.hosted_managed_external_state_enabled }}
          TIMEWEB_REQUIRED_HOSTED_MANAGED_EXECUTOR_URL: ${{ inputs.hosted_managed_executor_url }}
          TIMEWEB_REQUIRED_EXTERNAL_STATE_URL: ${{ inputs.external_state_url }}
        run: scripts/publish-timeweb-deploy-branch.sh dist/platform-timeweb-deploy
