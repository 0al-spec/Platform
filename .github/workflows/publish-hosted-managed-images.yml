name: Publish Hosted Managed Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest-pinned Caddy base
        id: caddy
        run: |
          docker pull caddy:2-alpine
          ref="$(docker image inspect --format '{{index .RepoDigests 0}}' caddy:2-alpine)"
          test -n "${ref}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Publish Platform hosted runtime
        id: platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hosted-managed
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/0al-spec/platform-hosted-managed:${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=hosted-managed-platform
          cache-to: type=gha,mode=max,scope=hosted-managed-platform

      - name: Publish capability-free hosted ingress
        id: ingress
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hosted-managed-ingress
          build-args: CADDY_BASE_IMAGE=${{ steps.caddy.outputs.ref }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/0al-spec/platform-hosted-managed-ingress:${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=hosted-managed-ingress
          cache-to: type=gha,mode=max,scope=hosted-managed-ingress

      - name: Write hosted managed image lock
        env:
          PLATFORM_DIGEST: ${{ steps.platform.outputs.digest }}
          INGRESS_DIGEST: ${{ steps.ingress.outputs.digest }}
          CADDY_BASE_REF: ${{ steps.caddy.outputs.ref }}
        run: |
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg generated_at "${generated_at}" \
            --arg source_commit "${GITHUB_SHA}" \
            --arg platform_ref "ghcr.io/0al-spec/platform-hosted-managed@${PLATFORM_DIGEST}" \
            --arg ingress_ref "ghcr.io/0al-spec/platform-hosted-managed-ingress@${INGRESS_DIGEST}" \
            --arg caddy_base_ref "${CADDY_BASE_REF}" \
            '{
              artifact_kind: "platform_hosted_managed_image_lock",
              schema_version: 1,
              generated_at: $generated_at,
              source_commit: $source_commit,
              platforms: ["linux/amd64", "linux/arm64"],
              images: {
                platform: {image_ref: $platform_ref},
                ingress: {
                  image_ref: $ingress_ref,
                  base_image_ref: $caddy_base_ref,
                  upstream_file_capability_removed: true
                }
              },
              supply_chain: {
                provenance_attestation: true,
                sbom_attestation: true
              },
              privacy_boundary: {
                public_safe: true,
                includes_secrets: false
              },
              authority_boundary: {
                may_deploy_production: false,
                may_expand_operation_allowlist: false,
                may_execute_managed_operations: false
              }
            }' > hosted-managed-image-lock.json
          python3 scripts/validate_hosted_managed_image_lock.py \
            hosted-managed-image-lock.json

      - name: Upload hosted managed image lock
        uses: actions/upload-artifact@v7
        with:
          name: hosted-managed-image-lock-${{ github.sha }}
          path: hosted-managed-image-lock.json
          if-no-files-found: error
          retention-days: 30
