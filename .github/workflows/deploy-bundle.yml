name: Deploy Bundle

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hosted-production-host-tools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test stdlib-only production host tools
        run: >-
          python3 -m unittest
          tests.test_hosted_managed_production_deploy
          tests.test_hosted_managed_production_env
          tests.test_hosted_managed_checkout
          tests.test_hosted_managed_cloud_init

  hosted-managed-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Test hosted service, queue, and canary contracts
        run: make hosted-managed-contract PYTHON=python3

      - name: Validate fail-closed hosted Compose contract
        run: make hosted-managed-compose-contract PYTHON=python3

      - name: Validate standalone hosted runtime Compose contract
        run: make hosted-managed-runtime-compose-contract PYTHON=python3

      - name: Validate TLS-fronted production hosted runtime contract
        run: make hosted-managed-production-contract PYTHON=python3

      - name: Validate hosted managed image publication contract
        run: make hosted-managed-image-lock-contract PYTHON=python3

      - name: Build standalone hosted runtime image
        run: >-
          docker build --file Dockerfile.hosted-managed
          --tag 0al/platform-hosted-managed:ci .

      - name: Verify hosted wrapper runtime dependencies
        run: >-
          docker run --rm 0al/platform-hosted-managed:ci
          python3 -c 'import jsonschema, psycopg'

      - name: Build capability-free hosted ingress image
        run: |
          docker pull caddy:2-alpine
          caddy_base="$(docker image inspect --format '{{index .RepoDigests 0}}' caddy:2-alpine)"
          docker build --file Dockerfile.hosted-managed-ingress \
            --build-arg "CADDY_BASE_IMAGE=${caddy_base}" \
            --tag 0al/platform-hosted-managed-ingress:ci .

  hosted-managed-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: managed_operations_test
          POSTGRES_USER: managed_operations
          POSTGRES_PASSWORD: managed-operations-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U managed_operations -d managed_operations_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PLATFORM_TEST_POSTGRES_URL: >-
        postgresql://managed_operations:managed-operations-ci@127.0.0.1:5432/managed_operations_test
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation and hosted dependencies
        run: python3 -m pip install -r requirements-dev.txt -r requirements-hosted.txt

      - name: Test PostgreSQL queue and hosted canary lifecycle
        run: make hosted-managed-postgres-integration PYTHON=python3

  hosted-managed-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Start hosted service and worker profile
        run: make hosted-managed-compose-smoke PYTHON=python3

      - name: Start TLS-fronted production hosted profile
        run: make hosted-managed-production-compose-smoke PYTHON=python3

  platform-deploy-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Platform
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Compile Python
        run: python3 -m compileall scripts/platform.py tests

      - name: Check whitespace
        run: git diff --check

      - name: Build production web deploy bundle
        run: >-
          python3 scripts/platform.py deploy bundle
          --profile production-web
          --output-dir dist/platform-deploy-bundle
          --format json

      - name: Validate bundled Compose config
        working-directory: dist/platform-deploy-bundle
        run: >-
          docker compose
          --env-file .env.example
          --file docker-compose.example.yml
          --file docker-compose.production-web.example.yml
          config

      - name: Write Timeweb image lock fixture
        run: |
          cat > dist/platform-service-images.json <<'JSON'
          {
            "artifact_kind": "platform_service_image_lock",
            "schema_version": 1,
            "services": {
              "specspace_api": {
                "image_ref": "ghcr.io/0al-spec/specspace-api@sha256:1111111111111111111111111111111111111111111111111111111111111111"
              },
              "specspace_ui": {
                "image_ref": "ghcr.io/0al-spec/specspace-ui@sha256:2222222222222222222222222222222222222222222222222222222222222222"
              }
            }
          }
          JSON

      - name: Build Timeweb manifest-only deploy tree
        run: >-
          python3 scripts/platform.py deploy timeweb-render
          --output-dir dist/platform-timeweb-deploy
          --image-lock dist/platform-service-images.json
          --release-commit "${GITHUB_SHA}"
          --release-created-at "1970-01-01T00:00:00Z"
          --format json

      - name: Validate Timeweb manifest-only deploy tree
        run: >-
          python3 scripts/platform.py deploy timeweb-validate
          --path dist/platform-timeweb-deploy

      - name: Validate Timeweb Compose config
        working-directory: dist/platform-timeweb-deploy
        run: docker compose --file docker-compose.yml config

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v7
        with:
          name: platform-deploy-bundle
          path: dist/platform-deploy-bundle
          if-no-files-found: error

      - name: Upload Timeweb deploy manifest
        uses: actions/upload-artifact@v7
        with:
          name: platform-timeweb-deploy
          path: dist/platform-timeweb-deploy
          if-no-files-found: error
