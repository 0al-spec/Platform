name: Deploy Bundle

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  platform-deploy-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Platform
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Compile Python
        run: python3 -m compileall scripts/platform.py tests

      - name: Check whitespace
        run: git diff --check

      - name: Build production web deploy bundle
        run: >-
          python3 scripts/platform.py deploy bundle
          --profile production-web
          --output-dir dist/platform-deploy-bundle
          --format json

      - name: Validate bundled Compose config
        working-directory: dist/platform-deploy-bundle
        run: >-
          docker compose
          --env-file .env.example
          --file docker-compose.example.yml
          --file docker-compose.production-web.example.yml
          config

      - name: Write Timeweb image lock fixture
        run: |
          cat > dist/platform-service-images.json <<'JSON'
          {
            "artifact_kind": "platform_service_image_lock",
            "schema_version": 1,
            "services": {
              "specspace_api": {
                "image_ref": "ghcr.io/0al-spec/specspace-api@sha256:1111111111111111111111111111111111111111111111111111111111111111"
              },
              "specspace_ui": {
                "image_ref": "ghcr.io/0al-spec/specspace-ui@sha256:2222222222222222222222222222222222222222222222222222222222222222"
              }
            }
          }
          JSON

      - name: Build Timeweb manifest-only deploy tree
        run: >-
          python3 scripts/platform.py deploy timeweb-render
          --output-dir dist/platform-timeweb-deploy
          --image-lock dist/platform-service-images.json
          --release-commit "${GITHUB_SHA}"
          --release-created-at "1970-01-01T00:00:00Z"
          --format json

      - name: Validate Timeweb manifest-only deploy tree
        run: >-
          python3 scripts/platform.py deploy timeweb-validate
          --path dist/platform-timeweb-deploy

      - name: Validate Timeweb Compose config
        working-directory: dist/platform-timeweb-deploy
        run: docker compose --file docker-compose.yml config

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: platform-deploy-bundle
          path: dist/platform-deploy-bundle
          if-no-files-found: error

      - name: Upload Timeweb deploy manifest
        uses: actions/upload-artifact@v4
        with:
          name: platform-timeweb-deploy
          path: dist/platform-timeweb-deploy
          if-no-files-found: error
