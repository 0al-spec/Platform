name: Deploy Bundle

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  platform-deploy-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Platform
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Compile Python
        run: python3 -m compileall scripts/platform.py tests

      - name: Check whitespace
        run: git diff --check

      - name: Build production web deploy bundle
        run: >-
          python3 scripts/platform.py deploy bundle
          --profile production-web
          --output-dir dist/platform-deploy-bundle
          --format json

      - name: Validate bundled Compose config
        working-directory: dist/platform-deploy-bundle
        run: >-
          docker compose
          --env-file .env.example
          --file docker-compose.example.yml
          --file docker-compose.production-web.example.yml
          config

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: platform-deploy-bundle
          path: dist/platform-deploy-bundle
          if-no-files-found: error
