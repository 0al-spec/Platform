name: 0al-platform

services:
  specpm-public-index:
    image: python:3.12-slim
    working_dir: /workspace/SpecPM
    command: ["python3", "scripts/serve_public_index.py", "--host", "0.0.0.0", "--port", "8081"]
    ports:
      - "8081:8081"
    volumes:
      - "${ORG_ROOT:?set ORG_ROOT}/SpecPM:/workspace/SpecPM:ro"

  specspace-api:
    image: python:3.12-slim
    working_dir: /workspace/ContextBuilder
    command:
      - "python3"
      - "viewer/server.py"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--specgraph-dir"
      - "/workspace/SpecGraph"
    ports:
      - "8001:8001"
    volumes:
      - "${ORG_ROOT:?set ORG_ROOT}/ContextBuilder:/workspace/ContextBuilder:ro"
      - "${ORG_ROOT:?set ORG_ROOT}/SpecGraph:/workspace/SpecGraph:ro"

  specspace-web:
    image: node:24-slim
    working_dir: /workspace/ContextBuilder/viewer/app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_BASE_URL: "http://127.0.0.1:8001"
    ports:
      - "5173:5173"
    volumes:
      - "${ORG_ROOT:?set ORG_ROOT}/ContextBuilder:/workspace/ContextBuilder:ro"
