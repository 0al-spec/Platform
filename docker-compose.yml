name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:fa614e99d0d69e789985571d34e522baba2ceeba2147e584c2c3a0f7990676a8"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:f6742fc2cfb8d6b21bc326e48ce5273a1ce064de3dc1fba5c2dac06eebc04323"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:f6742fc2cfb8d6b21bc326e48ce5273a1ce064de3dc1fba5c2dac06eebc04323"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:fa614e99d0d69e789985571d34e522baba2ceeba2147e584c2c3a0f7990676a8"
      SPECSPACE_RELEASE_COMMIT: "7395209b2d9140df435b7024ea37208adf848ebb"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
