name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f5573d5344eebe0ae1c3a19dd6da3f65a7e0d9e7fffc0dc6a1009e6702c8651a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5f5884a5009e66513ca61da3c58f7839049fec3b6b1363f205d6a96c445df317"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5f5884a5009e66513ca61da3c58f7839049fec3b6b1363f205d6a96c445df317"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f5573d5344eebe0ae1c3a19dd6da3f65a7e0d9e7fffc0dc6a1009e6702c8651a"
      SPECSPACE_RELEASE_COMMIT: "30878ce4f4041d3a818858db2c34f57fd2f568e3"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
