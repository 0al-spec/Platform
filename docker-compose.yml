name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a6ffe77be72d1a4bb3b57084abf15c566d095eadc67accffafdcd4e87167f5b8"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d30a07b11fe6993801aee882d6337fa90e39044af317085817995859a881ac94"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d30a07b11fe6993801aee882d6337fa90e39044af317085817995859a881ac94"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a6ffe77be72d1a4bb3b57084abf15c566d095eadc67accffafdcd4e87167f5b8"
      SPECSPACE_RELEASE_COMMIT: "f708d9e4d4fd101cb424a4e222bfd3de8261c9cf"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
