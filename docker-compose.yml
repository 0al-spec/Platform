name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1c010fa3c99112dfc348aee1a2a44ce78cb4f63ab36aac291e9488a5aa04d333"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:535f5d38016df3e2afa86be05dfa8526d7885b744c3c4f7395ee9c8b2a212964"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:535f5d38016df3e2afa86be05dfa8526d7885b744c3c4f7395ee9c8b2a212964"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1c010fa3c99112dfc348aee1a2a44ce78cb4f63ab36aac291e9488a5aa04d333"
      SPECSPACE_RELEASE_COMMIT: "ec03b38cc1fcabb3710f9fe23984f6d49075fea6"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
