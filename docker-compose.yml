name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f9870bd4af3b2007346e1f7bfde81e8dcb1b9f642984836a4d5c5fbb522bb43e"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ad523d372292005b2ffcf9f11f283b8f5f3439ef7afe1d12216cfbc909f77091"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ad523d372292005b2ffcf9f11f283b8f5f3439ef7afe1d12216cfbc909f77091"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f9870bd4af3b2007346e1f7bfde81e8dcb1b9f642984836a4d5c5fbb522bb43e"
      SPECSPACE_RELEASE_COMMIT: "52bc42436fa4904060e1dab83b9a9dc4a1e8ceaf"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
