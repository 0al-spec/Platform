name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:0c5d4261e68cb650d3bc27ecf061278bf8571ae2a958aa84af987538d50a7d44"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:6975eac4fcdd73d96fe1b7ac0763ea4ef12f67b7d3e602f104ec28d00d07e62f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:6975eac4fcdd73d96fe1b7ac0763ea4ef12f67b7d3e602f104ec28d00d07e62f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:0c5d4261e68cb650d3bc27ecf061278bf8571ae2a958aa84af987538d50a7d44"
      SPECSPACE_RELEASE_COMMIT: "8f409266624b863fda6e61421b14fbab6f76c78f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
