name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:668fe9441b3b2122c9ac0163007691c697657a3071865a7a2666c7ddc09a36c0"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9ad1ce1d9685ff48db03f06fde295a632d12b65efdb650b64138c1fdb267c645"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9ad1ce1d9685ff48db03f06fde295a632d12b65efdb650b64138c1fdb267c645"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:668fe9441b3b2122c9ac0163007691c697657a3071865a7a2666c7ddc09a36c0"
      SPECSPACE_RELEASE_COMMIT: "725b41ecb8a3e697e6d570d5f953c101acdd9f2d"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
