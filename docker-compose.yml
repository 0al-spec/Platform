name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:60f7cb1eb16cf4245d3b988a4b4428b0fbf2a4e73c08a9dad7dfffdefda1e81f"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:94b727e2821ff3bc2a86883ec0663268e670a74bb1308bf66cbcfe472cba0e14"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:94b727e2821ff3bc2a86883ec0663268e670a74bb1308bf66cbcfe472cba0e14"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:60f7cb1eb16cf4245d3b988a4b4428b0fbf2a4e73c08a9dad7dfffdefda1e81f"
      SPECSPACE_RELEASE_COMMIT: "cd1a0a045aa35d7191fc17c4f03b4fad27b5caa7"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
