name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:5dc4ebdb3a95ca260be5438c1085d64dfcc375358a141c4b68d2914fcd5e26b0"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:be10b8a108e82b7c103a3417a6f1ef93f985048344ffda4475d225d9b6e8f9c1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:be10b8a108e82b7c103a3417a6f1ef93f985048344ffda4475d225d9b6e8f9c1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:5dc4ebdb3a95ca260be5438c1085d64dfcc375358a141c4b68d2914fcd5e26b0"
      SPECSPACE_RELEASE_COMMIT: "2cbb85eb3ee1e7ec73f4e49aaffc115e74658cf5"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
