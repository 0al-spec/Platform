name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:38947b58d432690ba9ebf0cb41b3830dc4deebddeb1120669d5102e779d71d39"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:61b7ff0656d7c1ba177340426260cb4a0d12eb70a583f42eed0e549480cc6e9c"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:61b7ff0656d7c1ba177340426260cb4a0d12eb70a583f42eed0e549480cc6e9c"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:38947b58d432690ba9ebf0cb41b3830dc4deebddeb1120669d5102e779d71d39"
      SPECSPACE_RELEASE_COMMIT: "200c5b88ac284fbd431ad9a3673a650a59713e8f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "hosted-operation-canary=https://specgraph.tech/workspaces/hosted-operation-canary"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
