name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:91bdca5d456598b3710d5bc175599c241a9876e5d932151a7cc1c592a518196f"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:572633bb8603b0480493c4cc2ae4b27fe29668904adcc154e0fda3448a1448e3"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:572633bb8603b0480493c4cc2ae4b27fe29668904adcc154e0fda3448a1448e3"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:91bdca5d456598b3710d5bc175599c241a9876e5d932151a7cc1c592a518196f"
      SPECSPACE_RELEASE_COMMIT: "88c7773e80d5a94716de8b8e3a36aac47affe86e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
