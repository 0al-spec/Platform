name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:841b816cdc40bd737479ffea40e170f8d3835edb83b1d19d44a7f95b7d6a5b41"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:89da4b408b97de43ef27bdb95ff6f3f7bd93b95b557258046986380ff3121db0"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:89da4b408b97de43ef27bdb95ff6f3f7bd93b95b557258046986380ff3121db0"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:841b816cdc40bd737479ffea40e170f8d3835edb83b1d19d44a7f95b7d6a5b41"
      SPECSPACE_RELEASE_COMMIT: "cb2d03bd7f67b2aa7070762a0541d32bcbf5929f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
