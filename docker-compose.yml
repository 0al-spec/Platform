name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:bb85d1d5b682871424835738e53409af16fa1e362f8f8ad20486a2b2582f2f52"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3179da45e24339f83767274b14601381cdfdb706216eb110f6e4fa3b0bb35d27"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3179da45e24339f83767274b14601381cdfdb706216eb110f6e4fa3b0bb35d27"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:bb85d1d5b682871424835738e53409af16fa1e362f8f8ad20486a2b2582f2f52"
      SPECSPACE_RELEASE_COMMIT: "e7128e3ad9a8bac453a75e4bd56fd955b5795756"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
