name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:9d9d712fca23129c9d69863c16eb7aed087dc0bad3e4999d186b038e8eb4d60d"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3071794897eb9df78364461241da7d8e8fbd98e3d8df0b4bd7a1af2959a94e29"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3071794897eb9df78364461241da7d8e8fbd98e3d8df0b4bd7a1af2959a94e29"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:9d9d712fca23129c9d69863c16eb7aed087dc0bad3e4999d186b038e8eb4d60d"
      SPECSPACE_RELEASE_COMMIT: "6e234596f9499c3212212889dde79b72196b5527"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
