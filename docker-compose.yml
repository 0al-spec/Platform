name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ee6a058f69a1b93bc3c991840a34b81fcea7f489d789bf1ffebfc176952a7806"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:1fd42279adf3399e4867c8dcb07ae02d1229b8f35c7bad9f5867dcacbcce5519"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:1fd42279adf3399e4867c8dcb07ae02d1229b8f35c7bad9f5867dcacbcce5519"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ee6a058f69a1b93bc3c991840a34b81fcea7f489d789bf1ffebfc176952a7806"
      SPECSPACE_RELEASE_COMMIT: "9fa0582b5f0c168e4aa04efdf2cc978a44c088e9"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
