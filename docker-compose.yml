name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:964aa1899cfbabfedbca23c40ddf6abe2ae923bb9c3fafc9437d4e5d3306bc21"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:bb9b1a6625e1603c20c4a37fab84d8aacbd1ad2bba50950e62162942ec80c0cb"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:bb9b1a6625e1603c20c4a37fab84d8aacbd1ad2bba50950e62162942ec80c0cb"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:964aa1899cfbabfedbca23c40ddf6abe2ae923bb9c3fafc9437d4e5d3306bc21"
      SPECSPACE_RELEASE_COMMIT: "14135beefbd39fba9a5c4fe2a765b8429bd3bd67"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "hosted-operation-canary=https://specgraph.tech/workspaces/hosted-operation-canary"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
