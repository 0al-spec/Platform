name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:536a45213315a8362b9a7ff5dc5a25dc6d04123a62316d36a7dc18e95ec6c83c"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:24b4d8a238e579c551fd3c0536a6ba13b3a0c20ec8c7e1d22ffe40e58bf4a212"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:24b4d8a238e579c551fd3c0536a6ba13b3a0c20ec8c7e1d22ffe40e58bf4a212"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:536a45213315a8362b9a7ff5dc5a25dc6d04123a62316d36a7dc18e95ec6c83c"
      SPECSPACE_RELEASE_COMMIT: "ffd53226c051c0217fbe579e361912e6ae4ba229"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
