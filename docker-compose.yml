name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:bfb9710cb36cdf549102e02d9d92dbabba86471e2ffa1a13b44dcc5ac6998cc4"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9678f1b3bc7db245bb6c3bd72bae1a9e52114ddac3875675c1cf051c4b652402"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9678f1b3bc7db245bb6c3bd72bae1a9e52114ddac3875675c1cf051c4b652402"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:bfb9710cb36cdf549102e02d9d92dbabba86471e2ffa1a13b44dcc5ac6998cc4"
      SPECSPACE_RELEASE_COMMIT: "06c7b2aed3eb96f19c45e134845e71f903214c5f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
