name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:9aff10d25d26701c7997489e15f5e1312a8747ab1940ab3737f569695304d83e"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3c6c19b5eb7801b26d6549d2cd0bde3bd9ab4e85762a1d3fde5342b994bf2c3e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3c6c19b5eb7801b26d6549d2cd0bde3bd9ab4e85762a1d3fde5342b994bf2c3e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:9aff10d25d26701c7997489e15f5e1312a8747ab1940ab3737f569695304d83e"
      SPECSPACE_RELEASE_COMMIT: "c0db831aa9cf4be0bf8c1e63a55a2c95b17995da"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
