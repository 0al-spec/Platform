name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:6646171994a84952515fbf280d603b6d61cbf4ab0b46d71a24f21cc0a8ae4bd0"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:937c49f57faf30261609f261ec272335e7839a0137aea240c54b98838dc4d6d8"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:937c49f57faf30261609f261ec272335e7839a0137aea240c54b98838dc4d6d8"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:6646171994a84952515fbf280d603b6d61cbf4ab0b46d71a24f21cc0a8ae4bd0"
      SPECSPACE_RELEASE_COMMIT: "d3ef7de44fe1a32ad66bcfb433d2a91259ca76c4"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
