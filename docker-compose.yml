name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:6bf6856e719c0e0dcd5ecdf14eef4042c9e4e16b7621ac66fd2c9aed671bbc22"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:668c741c6bc7d15d75d3bc887ffa3abe0c52f5c9af52574d0857cfc0fc680b29"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:668c741c6bc7d15d75d3bc887ffa3abe0c52f5c9af52574d0857cfc0fc680b29"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:6bf6856e719c0e0dcd5ecdf14eef4042c9e4e16b7621ac66fd2c9aed671bbc22"
      SPECSPACE_RELEASE_COMMIT: "f151e373c81481294de31d62271645d5e8990de5"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "hosted-operation-canary=https://specgraph.tech/workspaces/hosted-operation-canary"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
