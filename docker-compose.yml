name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:d0d2f6a1b1353cd42f39999e39b246dbef32f2c6daf6c614a44c7bc1af5b3b49"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9d1f01d232a425ded9a7fb27930b70f116bedcb2d55d1f95d06575d6460dc3ae"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9d1f01d232a425ded9a7fb27930b70f116bedcb2d55d1f95d06575d6460dc3ae"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:d0d2f6a1b1353cd42f39999e39b246dbef32f2c6daf6c614a44c7bc1af5b3b49"
      SPECSPACE_RELEASE_COMMIT: "a7200009ea1beab5f478f31582845b88b74e036e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
