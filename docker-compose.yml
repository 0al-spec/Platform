name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:696b152f42ff5bab6186c6bf3d797ccb3dad955a6eb95e8f2fe885f1cd7419da"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:56c6fc6c938db9640dabed11bf5725a8513abee16106a7be16b9313d6e49e26b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:56c6fc6c938db9640dabed11bf5725a8513abee16106a7be16b9313d6e49e26b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:696b152f42ff5bab6186c6bf3d797ccb3dad955a6eb95e8f2fe885f1cd7419da"
      SPECSPACE_RELEASE_COMMIT: "1afe419c473fd2d6bf69795397b9558d8f30bc56"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
