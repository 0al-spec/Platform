name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:4b661bba6eb2b9052476fd1943ac813af4311e56e3990f8fd29503dacee36ce4"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:31f12d672a9cac7dc58b599994b1ebfbbda7dcb63a1d75ee6abc5da022d87723"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:31f12d672a9cac7dc58b599994b1ebfbbda7dcb63a1d75ee6abc5da022d87723"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:4b661bba6eb2b9052476fd1943ac813af4311e56e3990f8fd29503dacee36ce4"
      SPECSPACE_RELEASE_COMMIT: "e913717dbf9a1ca63a00d3cb7dd04d413b997517"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
