name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:22507e4ea1fa42a8f73a4d86439db027444c86859c3b4124c1e2fd9daf5a71a3"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:83b94e1b6df640e0a4af5f1303cd6bb3f0a0c53f1adca3f63e4d5e8dbcd6d06e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:83b94e1b6df640e0a4af5f1303cd6bb3f0a0c53f1adca3f63e4d5e8dbcd6d06e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:22507e4ea1fa42a8f73a4d86439db027444c86859c3b4124c1e2fd9daf5a71a3"
      SPECSPACE_RELEASE_COMMIT: "7a0ce80649546b72c50d1d6e6de0871b09e6c83d"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
