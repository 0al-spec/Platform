name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:73547a375d47185b6dba121da0bcf27e1165f67a92c2b220afec9b0674004034"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:54f106990b0498cb7af5a924945a7fd46c64c264c38f3a0e0f49c32dd88897e9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:54f106990b0498cb7af5a924945a7fd46c64c264c38f3a0e0f49c32dd88897e9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:73547a375d47185b6dba121da0bcf27e1165f67a92c2b220afec9b0674004034"
      SPECSPACE_RELEASE_COMMIT: "4de9b1e4d27456ce85b7cdec701b8540bae0d755"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
