name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f40df65df2d29c5c6e2463c7ef7ba8c6e7f55d03a6b1a81ae8c98aeba2466099"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2f850d0d23fcb19a57a25d89c39090a120831977a4108d0e90f06c17b544ec01"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2f850d0d23fcb19a57a25d89c39090a120831977a4108d0e90f06c17b544ec01"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f40df65df2d29c5c6e2463c7ef7ba8c6e7f55d03a6b1a81ae8c98aeba2466099"
      SPECSPACE_RELEASE_COMMIT: "eeb3dd6e27aeedcb7b72b6878d294b9bb2a47a9e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
