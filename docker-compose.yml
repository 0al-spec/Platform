name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:915be38b86dd2381bb53a94cbbeddee59e587570de1a55b8e37973f15389404c"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:f66633891bc6df6cb15bed9ccec6582cec5d81033e23bc3a8b46da7ba0147cdf"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:f66633891bc6df6cb15bed9ccec6582cec5d81033e23bc3a8b46da7ba0147cdf"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:915be38b86dd2381bb53a94cbbeddee59e587570de1a55b8e37973f15389404c"
      SPECSPACE_RELEASE_COMMIT: "71b9c0aa250d4bd7216549816f2e32f2b84c00d0"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
