name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:19037ac10f6e92c8e24d63428c8f405c6773ff33dc2facdc04cda407ae5612bf"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:57beff0d1b126efcd3ad250fe555f17658ac24f7b01029a218eaa193cc98c034"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:57beff0d1b126efcd3ad250fe555f17658ac24f7b01029a218eaa193cc98c034"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:19037ac10f6e92c8e24d63428c8f405c6773ff33dc2facdc04cda407ae5612bf"
      SPECSPACE_RELEASE_COMMIT: "99dbb03a533d8f460ac63bce62981698a0e3769f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
