name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c7d8b0539f909683f552b51d47d3a79cf0e763561f4cec5822ad4dbe592a9b6c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a4d157c3046ccf5ca11e3d3a20b70cfb5e9b3e2b4c10185150dc1a0253295d89"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a4d157c3046ccf5ca11e3d3a20b70cfb5e9b3e2b4c10185150dc1a0253295d89"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c7d8b0539f909683f552b51d47d3a79cf0e763561f4cec5822ad4dbe592a9b6c"
      SPECSPACE_RELEASE_COMMIT: "306a09914b2d4475941ab089620047aaefb54fcf"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
