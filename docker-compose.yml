name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8df031e993f7ada3b329051fdb6c5bc2f10aa7bd5f4fdbd74f8da5351a6ad480"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:71f3ffaf82209a1b98fdc9c420bb6ff31d61ca485c9d102290e9401cf63d8c40"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:71f3ffaf82209a1b98fdc9c420bb6ff31d61ca485c9d102290e9401cf63d8c40"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8df031e993f7ada3b329051fdb6c5bc2f10aa7bd5f4fdbd74f8da5351a6ad480"
      SPECSPACE_RELEASE_COMMIT: "00c86ed88c95068f47c24a58684ecb038a39dadf"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
