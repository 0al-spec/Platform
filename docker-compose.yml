name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:5b70d247ec1e0c1a6ebffd7ac76aad1def73a2632da977fcdf6e53ca48db4766"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:db1eb36fa2e984a9e70bb64947d2cf5e47757288a64652039fc017e8db54df16"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:db1eb36fa2e984a9e70bb64947d2cf5e47757288a64652039fc017e8db54df16"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:5b70d247ec1e0c1a6ebffd7ac76aad1def73a2632da977fcdf6e53ca48db4766"
      SPECSPACE_RELEASE_COMMIT: "67782226a85a6e61537c4de8e236ac38324f8db5"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
