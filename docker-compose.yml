name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:6e9cfeb17aca377ed898ed29fd6d148ceb115b8f43b3edad9b5fb7fb3bca0ce7"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:6806a9051836177cbe7598ea250fa8018f9f1e96093bbca5f206b9f8947f5874"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:6806a9051836177cbe7598ea250fa8018f9f1e96093bbca5f206b9f8947f5874"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:6e9cfeb17aca377ed898ed29fd6d148ceb115b8f43b3edad9b5fb7fb3bca0ce7"
      SPECSPACE_RELEASE_COMMIT: "f50b7899b2de2c055ee630ff2d591df63b994645"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
