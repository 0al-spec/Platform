name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:673f9a2a0f335edd9fee757576c7608b2591a21c333076cac421c42287c8b8d4"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:137ec7d02641991a51ea24c761ae43092f5571a439e3958c1e27faa4b44dc67c"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:137ec7d02641991a51ea24c761ae43092f5571a439e3958c1e27faa4b44dc67c"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:673f9a2a0f335edd9fee757576c7608b2591a21c333076cac421c42287c8b8d4"
      SPECSPACE_RELEASE_COMMIT: "cd56d1e70a5c7d7c5e70f1f8f927f77467cb054e"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
