name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1b3f0f26df2cea1d9e7000bd2e067cf9fd8d5e7632677af30e038c16982e14f2"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:0f1437f75c6ee5c539e349795440f60eada43b90617f53cd62b87b6d897caf30"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:0f1437f75c6ee5c539e349795440f60eada43b90617f53cd62b87b6d897caf30"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1b3f0f26df2cea1d9e7000bd2e067cf9fd8d5e7632677af30e038c16982e14f2"
      SPECSPACE_RELEASE_COMMIT: "3ba7c8eb1995a9c0ff56c2d9de3e2d5ac097a760"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
