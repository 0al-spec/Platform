name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:61f1f10c15ec7b76d33e1ab9f1d8916f06079b76eaf8931f0bccb0cb1490fc1e"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c3436241d7f771f3dad25987f3e6e28bc9ac9ea014e137f075c6107abd968aa2"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c3436241d7f771f3dad25987f3e6e28bc9ac9ea014e137f075c6107abd968aa2"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:61f1f10c15ec7b76d33e1ab9f1d8916f06079b76eaf8931f0bccb0cb1490fc1e"
      SPECSPACE_RELEASE_COMMIT: "44966b562a1192eecb61bb57aa46b4f8540c1dee"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
