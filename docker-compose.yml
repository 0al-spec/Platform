name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:4b2ed8b9863c2b9bd0d6782dd01d607b14d616d5e728de960e30c0222655e3f9"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5a8102356d9fef13c4a8f61c5bd5a4d3f6320a35dec7ab804a1f97e78b0fff40"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5a8102356d9fef13c4a8f61c5bd5a4d3f6320a35dec7ab804a1f97e78b0fff40"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:4b2ed8b9863c2b9bd0d6782dd01d607b14d616d5e728de960e30c0222655e3f9"
      SPECSPACE_RELEASE_COMMIT: "2f0570d06eaf208cba6adfb943b59a17c5f6f398"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --team-decision-log-artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
