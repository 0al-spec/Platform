name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:61a2b76052bad64ffbfcd0ee6fc3c07a900201b40ebbd7656a2b2dd2ee381ac4"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2fead9a10bb98e3366456e1019ad54999f55970e04ba94ba369517d07c0a9ea5"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2fead9a10bb98e3366456e1019ad54999f55970e04ba94ba369517d07c0a9ea5"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:61a2b76052bad64ffbfcd0ee6fc3c07a900201b40ebbd7656a2b2dd2ee381ac4"
      SPECSPACE_RELEASE_COMMIT: "92fc0f5f5f4c5997fc52482f8e6a9baff1de01e7"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
