name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:931bd64f70670a4dd2ce91b9312552f3cf192040a61b956b5f802d52f1f63f09"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:cf2de70ebd3b43d08e9bea9ad1775c4526a993e0480accf4cdddcd396fb44ad9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:cf2de70ebd3b43d08e9bea9ad1775c4526a993e0480accf4cdddcd396fb44ad9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:931bd64f70670a4dd2ce91b9312552f3cf192040a61b956b5f802d52f1f63f09"
      SPECSPACE_RELEASE_COMMIT: "3c6517c7c014b2cb500c99b41fe3d5a44d4f0998"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
