name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:2bbb46eba2b0527f6241b45a1e1e86e1af683202d2378a63cd09fe8dc0a120be"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:0242adafd806278091a4f2b32a2c7f0d453b577af0b71a86eb443d8a2b0513d6"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:0242adafd806278091a4f2b32a2c7f0d453b577af0b71a86eb443d8a2b0513d6"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:2bbb46eba2b0527f6241b45a1e1e86e1af683202d2378a63cd09fe8dc0a120be"
      SPECSPACE_RELEASE_COMMIT: "14571e87983d728403536be071574cc8fa2bc059"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
