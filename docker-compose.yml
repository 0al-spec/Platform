name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:cd7b2ebd58e14aa1c5e3b4c9a9dd2fdeb9950fec1eba5fe54bdf0710b1390350"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:34ef428e70b94fd7ae319314ef3b96722aaec6d3c5037deb25b6c4b257be67c1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:34ef428e70b94fd7ae319314ef3b96722aaec6d3c5037deb25b6c4b257be67c1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:cd7b2ebd58e14aa1c5e3b4c9a9dd2fdeb9950fec1eba5fe54bdf0710b1390350"
      SPECSPACE_RELEASE_COMMIT: "54c647a693fc27493018b442adbf090dac65fedf"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
