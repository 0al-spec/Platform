name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8b7a42378ee543ff68bd6a44cedf05bf38fdb1ac0e5ecb089b7ab22037a8691e"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d432b87ed84e636a5837c7afbb0d8264095640739a810a4235d0d27a2be256b0"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d432b87ed84e636a5837c7afbb0d8264095640739a810a4235d0d27a2be256b0"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8b7a42378ee543ff68bd6a44cedf05bf38fdb1ac0e5ecb089b7ab22037a8691e"
      SPECSPACE_RELEASE_COMMIT: "9e488609e8ef83ca1476fb534b954db0ba0551d8"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
