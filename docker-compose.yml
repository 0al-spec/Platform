name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:94eed1ae9c4325a12b3cdbb1d7494c9dac5e79e4e53cdc155ff9145bf14fbe34"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:4ddec89d5723852d2b32e1292ad821e078ed70c5f3566c608e07671980485443"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:4ddec89d5723852d2b32e1292ad821e078ed70c5f3566c608e07671980485443"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:94eed1ae9c4325a12b3cdbb1d7494c9dac5e79e4e53cdc155ff9145bf14fbe34"
      SPECSPACE_RELEASE_COMMIT: "9a067cf165017161a35e89c4ecf9bc7daa158ff5"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
