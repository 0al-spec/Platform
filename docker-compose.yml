name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ccbba726058aa04d88ea389b02efa0820059ad2e271afcd4b72ef763c0dfb7ed"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:09b5162f6263ac78860ac8eccde6a90cecbbbf325089c5eaeb1f14f4992f0253"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:09b5162f6263ac78860ac8eccde6a90cecbbbf325089c5eaeb1f14f4992f0253"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ccbba726058aa04d88ea389b02efa0820059ad2e271afcd4b72ef763c0dfb7ed"
      SPECSPACE_RELEASE_COMMIT: "126a7ac0fb74a5d08adb95bdf520251c2d60e5ec"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
