name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:b36d3d2185de3d5f498ea689b6f86a7a2b22e48bf53bfc3a7849a67ba93898c1"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:16409c2c14ba737f7386d411c6580e080a4ee97d9e72e290b227be31d297876f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:16409c2c14ba737f7386d411c6580e080a4ee97d9e72e290b227be31d297876f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:b36d3d2185de3d5f498ea689b6f86a7a2b22e48bf53bfc3a7849a67ba93898c1"
      SPECSPACE_RELEASE_COMMIT: "b0a492da7497cdc21901125a345ccdf33172eddc"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
