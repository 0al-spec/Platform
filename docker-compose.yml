name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7d54b1cc0c0c0ff7d2fdada7717eb7321dbee7f8a276b91e87fcdbd651aaff26"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e9841fe994a0c963368aa98680b18cda659efac44009d40fa98f130fd5b277de"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e9841fe994a0c963368aa98680b18cda659efac44009d40fa98f130fd5b277de"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7d54b1cc0c0c0ff7d2fdada7717eb7321dbee7f8a276b91e87fcdbd651aaff26"
      SPECSPACE_RELEASE_COMMIT: "93a1d86542b9f7b83fb2d8aa7b4faad660651836"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
