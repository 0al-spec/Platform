name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c39c765f8ad182f0dd9aea717e775a26b35798cd10a589fb97d563d6201944c1"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ce43c092da253e36c09172ce9a5be4d91567ec80e9301fb64d23b7d07115c68a"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ce43c092da253e36c09172ce9a5be4d91567ec80e9301fb64d23b7d07115c68a"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c39c765f8ad182f0dd9aea717e775a26b35798cd10a589fb97d563d6201944c1"
      SPECSPACE_RELEASE_COMMIT: "77a0ffb48c8f5467502c186fd1ae0e6ca0124bee"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
