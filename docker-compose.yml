name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:109eb4bfc266ea5a3865754461e2dfec5f24f69b5db2d8f04e2c52dbefba935c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:193bb90a4a65ff728b87b406f436fc53e504c0d905b70baa77c941c74d40b803"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:193bb90a4a65ff728b87b406f436fc53e504c0d905b70baa77c941c74d40b803"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:109eb4bfc266ea5a3865754461e2dfec5f24f69b5db2d8f04e2c52dbefba935c"
      SPECSPACE_RELEASE_COMMIT: "71829832c53bd9648ee2cd61f459bc9d10f19314"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
