name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:6434c9552cd7035611410edfbb21e6a684e8fbb27da85153a0ed16592e6bf5e1"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:dfa1c15fd6fc3146d27956447e238a4eec88e093c273ea636b024207a18b7b75"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:dfa1c15fd6fc3146d27956447e238a4eec88e093c273ea636b024207a18b7b75"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:6434c9552cd7035611410edfbb21e6a684e8fbb27da85153a0ed16592e6bf5e1"
      SPECSPACE_RELEASE_COMMIT: "c9238a07189fe1c66f7291c331766cd28b70624e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
