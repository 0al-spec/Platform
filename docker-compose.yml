name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:27e253aa03242896c17eac1a262375a54e08ce0fa9d6de8fa11af08efb10a96a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c7b98c8ebfe1482253f2ec6321224e67e02147e576b91b7e722b32d57f0d928b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c7b98c8ebfe1482253f2ec6321224e67e02147e576b91b7e722b32d57f0d928b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:27e253aa03242896c17eac1a262375a54e08ce0fa9d6de8fa11af08efb10a96a"
      SPECSPACE_RELEASE_COMMIT: "fbd8b6c3241479c03b59ae36acb4a9774ae90e23"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
