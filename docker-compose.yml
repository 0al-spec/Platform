name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:b5d7ddcb3f927829636f9fe3c27352501b6a653498088767b949c4f9b97756ce"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:f3f331321ce8531f6b95ab342fad437f6fde98bfd060887b81adb06fd6d107ab"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:f3f331321ce8531f6b95ab342fad437f6fde98bfd060887b81adb06fd6d107ab"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:b5d7ddcb3f927829636f9fe3c27352501b6a653498088767b949c4f9b97756ce"
      SPECSPACE_RELEASE_COMMIT: "25f06f676c71226d4a6640f08adaa3f3ce082c22"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
