name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:9ba81096a708cb80cb919a08de41b9fd15d403156106480fb1084c4c7fbe331c"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:b5069ed56812bfe3bf766320a064c9dfed83c0d5581505a555846c009fa5cc3e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:b5069ed56812bfe3bf766320a064c9dfed83c0d5581505a555846c009fa5cc3e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:9ba81096a708cb80cb919a08de41b9fd15d403156106480fb1084c4c7fbe331c"
      SPECSPACE_RELEASE_COMMIT: "84448651d32f94627144fb6a6e5edbc0954b8863"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "hosted-operation-canary=https://specgraph.tech/workspaces/hosted-operation-canary"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
