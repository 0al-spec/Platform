name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:229039267c3fd668350fe82797a7e7fd1d8b95e4df90a2a91d55fbb33b08ff87"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:fc1f39eb675a368dcd75a629ec69a57113608d2a21c35ba5fdeb1d9df0a0034f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:fc1f39eb675a368dcd75a629ec69a57113608d2a21c35ba5fdeb1d9df0a0034f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:229039267c3fd668350fe82797a7e7fd1d8b95e4df90a2a91d55fbb33b08ff87"
      SPECSPACE_RELEASE_COMMIT: "87d022f1f980a6c12258c80544e7553412f9e5ad"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
      SPECSPACE_HOSTED_MANAGED_EXECUTION_ENABLED: "true"
      SPECSPACE_HOSTED_MANAGED_EXECUTOR_URL: "https://managed.specgraph.tech"
      SPECSPACE_HOSTED_MANAGED_EXECUTOR_TIMEOUT_SECONDS: "5"
      SPECSPACE_HOSTED_MANAGED_EXECUTOR_TOKEN:
      SPECSPACE_HOSTED_MANAGED_STATE_DURABILITY: "persistent"
      SPECSPACE_HOSTED_MANAGED_OPERATION_ALLOWLIST: "review_status_execute"
      SPECSPACE_EXTERNAL_STATE_ENABLED: "true"
      SPECSPACE_EXTERNAL_STATE_URL: "https://managed.specgraph.tech/specspace-state"
      SPECSPACE_EXTERNAL_STATE_TOKEN:
      SPECSPACE_EXTERNAL_STATE_TIMEOUT_SECONDS: "5"
      SPECSPACE_STATE_DIR: "/tmp/specspace-external-state-cache"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "hosted-operation-canary=https://specgraph.tech/workspaces/hosted-operation-canary"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --enable-hosted-managed-execution
      - --hosted-managed-executor-url
      - "https://managed.specgraph.tech"
      - --hosted-managed-executor-timeout-seconds
      - "5"
      - --specspace-state-dir
      - /tmp/specspace-external-state-cache
      - --hosted-managed-state-durability
      - persistent
      - --hosted-managed-operation-allowlist
      - review_status_execute
      - --enable-external-state
      - --external-state-url
      - "https://managed.specgraph.tech/specspace-state"
      - --external-state-timeout-seconds
      - "5"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
