name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:97c6b3648a9de6c62d8ee724f8c4698c6cda5391647ff9f92dbc363468788f53"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9010045a13acf7a073d899fcd2df433f7eb9101334d44927edb0d107d832adac"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9010045a13acf7a073d899fcd2df433f7eb9101334d44927edb0d107d832adac"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:97c6b3648a9de6c62d8ee724f8c4698c6cda5391647ff9f92dbc363468788f53"
      SPECSPACE_RELEASE_COMMIT: "7f81934fcd6c8f049abf381dda76027bfd82ec4b"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
