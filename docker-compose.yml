name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:190971375d2859aff13ccf1579fd9cfef033d1957507831166f4b1c57b72ffa1"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:6151751743dc1b7b34cfbf123450f8e7b6295a6e5ca64e09abccc1d1a1b57a1b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:6151751743dc1b7b34cfbf123450f8e7b6295a6e5ca64e09abccc1d1a1b57a1b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:190971375d2859aff13ccf1579fd9cfef033d1957507831166f4b1c57b72ffa1"
      SPECSPACE_RELEASE_COMMIT: "2e9fd16daf60e55933c4fd414fcf12460fe7337d"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
