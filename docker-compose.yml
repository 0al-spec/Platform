name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ce1843889f646b731e754134397429974b5148fd5049bc134294cf07b4487a2f"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:fa9991d7a558ecf9a32c31b61b51afb3819e986143c43086905ebf6b336b411e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:fa9991d7a558ecf9a32c31b61b51afb3819e986143c43086905ebf6b336b411e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ce1843889f646b731e754134397429974b5148fd5049bc134294cf07b4487a2f"
      SPECSPACE_RELEASE_COMMIT: "7a972da9dcd825f4e7b00a985f9fcdbd3565bd98"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
