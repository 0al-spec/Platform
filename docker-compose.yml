name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f9f7fdab263cc40f86f6279ac2a614a0b1dee5e0fb0eac1eced79618a7f2183e"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ff8ed5fb5702fbb099979f16bc2ed9abeb77a4c757c7e84a471ef7f5aa677f1a"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ff8ed5fb5702fbb099979f16bc2ed9abeb77a4c757c7e84a471ef7f5aa677f1a"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f9f7fdab263cc40f86f6279ac2a614a0b1dee5e0fb0eac1eced79618a7f2183e"
      SPECSPACE_RELEASE_COMMIT: "c78d5c9a019cf264e41c7a60c6f356db85355233"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
