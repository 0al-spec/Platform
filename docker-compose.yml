name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:79d127b14a07705ea83cb13e4ba8c2ba297f2d0647d87b65fe931655a4edb8ff"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e22b2421b1ad3077e950b85a9bf769e2611286ec83426a9d1957a38513cc7059"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e22b2421b1ad3077e950b85a9bf769e2611286ec83426a9d1957a38513cc7059"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:79d127b14a07705ea83cb13e4ba8c2ba297f2d0647d87b65fe931655a4edb8ff"
      SPECSPACE_RELEASE_COMMIT: "d544491131635b8d0593c38ab60056a9b3d14cb0"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
