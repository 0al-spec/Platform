name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7f199812cc3f9adb029750d7b9476789c0cf315c4135ea86e82c09dde4dd0fd9"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e2abf8b2ebacc66fa6fa405393fc9c341ca5ed6fe14239c7a2e1c8fa76e8cada"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e2abf8b2ebacc66fa6fa405393fc9c341ca5ed6fe14239c7a2e1c8fa76e8cada"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7f199812cc3f9adb029750d7b9476789c0cf315c4135ea86e82c09dde4dd0fd9"
      SPECSPACE_RELEASE_COMMIT: "8ac41a4a2aca68116efe0e3cc16d7275feb1f0da"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
