name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:178994e5b0e3006c9b95811f6109ab5eaeadc90e19ccd4b72efa06a3d33c62d3"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ced656910cf34ae7ce2ccc8d53466ecef5cb5ea83e3b335770b4f818d5b91711"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ced656910cf34ae7ce2ccc8d53466ecef5cb5ea83e3b335770b4f818d5b91711"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:178994e5b0e3006c9b95811f6109ab5eaeadc90e19ccd4b72efa06a3d33c62d3"
      SPECSPACE_RELEASE_COMMIT: "36bb1febb8c80bc5bacf8da418a458c54be570ad"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
