name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ad61265f0be676e081889efa70837974426826d170ab028deeddd6331ea540af"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d82c2ac73f17f2aba10984fcc431995ae86c5230378de0dba846e861e4fdc915"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d82c2ac73f17f2aba10984fcc431995ae86c5230378de0dba846e861e4fdc915"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ad61265f0be676e081889efa70837974426826d170ab028deeddd6331ea540af"
      SPECSPACE_RELEASE_COMMIT: "2ba27351ef738164fd654e9cb799e78b98f86949"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
