name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:e1e3f6c9ff271f8eb1f2da5c643fc75a87c14b66e06f4b37d78205e17c25aa39"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e2f9b280afb7026d3c2e54aaedf05705c9996c20e4fdce542e72e517ede772a9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e2f9b280afb7026d3c2e54aaedf05705c9996c20e4fdce542e72e517ede772a9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:e1e3f6c9ff271f8eb1f2da5c643fc75a87c14b66e06f4b37d78205e17c25aa39"
      SPECSPACE_RELEASE_COMMIT: "5a528ff9bc02ae27640276ddecf4575b8dceb363"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
