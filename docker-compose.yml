name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:69a4ea6991eee7c450bfa22fe7523ddbc5e33de85fa63c37602c61926c0523f8"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:8e9efd727cc300ee90a1e055d9edcf5d71eab0d7c7f2df9cb66f96ca936a1e5c"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:8e9efd727cc300ee90a1e055d9edcf5d71eab0d7c7f2df9cb66f96ca936a1e5c"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:69a4ea6991eee7c450bfa22fe7523ddbc5e33de85fa63c37602c61926c0523f8"
      SPECSPACE_RELEASE_COMMIT: "e8a6429775925c47e370c37e031947f02c487399"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
