name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:842fbcb12e493de9d0569fa559691887d438bfcb833858fe0267fcac3e0108c0"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a3a26707fdef7b583cb1ddcb59e71bcd07e1fdaf4ddf35dbd04c479bedd6270e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a3a26707fdef7b583cb1ddcb59e71bcd07e1fdaf4ddf35dbd04c479bedd6270e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:842fbcb12e493de9d0569fa559691887d438bfcb833858fe0267fcac3e0108c0"
      SPECSPACE_RELEASE_COMMIT: "0451c8239f471fa64446ca08b3d3ce61e4c18c90"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
