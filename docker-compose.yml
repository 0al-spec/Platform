name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:5fa7a7be37743dbd35ac086f054907231676ece2986d9bb30299be6e2e11c06f"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:4e97dd6e3a274e4ab240d7b33a379190c3376872b89fe1c395b4beb712e07a84"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:4e97dd6e3a274e4ab240d7b33a379190c3376872b89fe1c395b4beb712e07a84"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:5fa7a7be37743dbd35ac086f054907231676ece2986d9bb30299be6e2e11c06f"
      SPECSPACE_RELEASE_COMMIT: "7bfb2a37656edb405f9be963e7ce4b4474b2f2c9"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
