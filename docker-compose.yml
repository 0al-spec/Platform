name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:675d7ab53edb5cf12d4f1c7fd6d8331dc1f152d7ce3dc7b19b14d567383c6cf5"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:8c4dbf6cff4487c390953ee2a541bf8fab9efab789edb1f300d6b8709c346606"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:8c4dbf6cff4487c390953ee2a541bf8fab9efab789edb1f300d6b8709c346606"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:675d7ab53edb5cf12d4f1c7fd6d8331dc1f152d7ce3dc7b19b14d567383c6cf5"
      SPECSPACE_RELEASE_COMMIT: "a1076e61203181402680985d8c8d598fef677c5f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
