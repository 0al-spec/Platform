name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:01d248c9e85ecc67c836cab1d4303a04a39d5b23ad1fd6e2be1b55ac434336fd"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c61ef0dd9957d6bbb92a1b22ad279c5ba87c2d96c2ea5466117e4e8d16b9b1eb"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c61ef0dd9957d6bbb92a1b22ad279c5ba87c2d96c2ea5466117e4e8d16b9b1eb"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:01d248c9e85ecc67c836cab1d4303a04a39d5b23ad1fd6e2be1b55ac434336fd"
      SPECSPACE_RELEASE_COMMIT: "025046fa96c2623d255f04cb1a0f0f6d5bec288e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
