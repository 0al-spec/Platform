name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:0acb42111bc3681878df5a51de66c591267d9d01277ef98ad2b1c17b6cfee6a7"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c5e30c99099a7da06a26bfc32bcfe4716ffd50500421ef78fedab6f73e56dcfa"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c5e30c99099a7da06a26bfc32bcfe4716ffd50500421ef78fedab6f73e56dcfa"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:0acb42111bc3681878df5a51de66c591267d9d01277ef98ad2b1c17b6cfee6a7"
      SPECSPACE_RELEASE_COMMIT: "a4f30b05fe8700f2f3cee40705526da6ff9b503a"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
