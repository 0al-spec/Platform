name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ac7bfb86cc461be49d8d48a6a623455c9f66ae0f046721f1fd4595f05b8ff884"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:4186ab7c6c6d1b180b8946d7646290ddf451c82d063c3e4de9825e7c2ef77ff2"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:4186ab7c6c6d1b180b8946d7646290ddf451c82d063c3e4de9825e7c2ef77ff2"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ac7bfb86cc461be49d8d48a6a623455c9f66ae0f046721f1fd4595f05b8ff884"
      SPECSPACE_RELEASE_COMMIT: "971314aca25bb55d92081c03060872d95a58c19f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
