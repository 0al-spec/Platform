name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:bf45f1577c4bc12be2db4d5c611fc519836a264d8eaf0c453b15e89adfc27e88"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:7657fbab68168b299ee83e9ad0ad5c4a5837cfe26992aaa674eed278095abbae"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:7657fbab68168b299ee83e9ad0ad5c4a5837cfe26992aaa674eed278095abbae"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:bf45f1577c4bc12be2db4d5c611fc519836a264d8eaf0c453b15e89adfc27e88"
      SPECSPACE_RELEASE_COMMIT: "5ed3b54b7e25c7ca295c4c4c57663174f681f104"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
