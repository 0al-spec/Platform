name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:0e8fa40274b2d98e4bd51006b42c7352b3a0bcb4a64e8ce9da9c6e3115c5c10f"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3b166a3ec0065260034c4a8f753698d1c53c7cba4186cf395eeb6ed91585e9ff"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3b166a3ec0065260034c4a8f753698d1c53c7cba4186cf395eeb6ed91585e9ff"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:0e8fa40274b2d98e4bd51006b42c7352b3a0bcb4a64e8ce9da9c6e3115c5c10f"
      SPECSPACE_RELEASE_COMMIT: "720cd3672c60c8681ffacb65ef672b4dfb1dde05"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
