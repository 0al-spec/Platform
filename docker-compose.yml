name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a76de3e5b1f125b534c69a96d404821d4ea5645f3fb5a65fc5d99175b6d767bc"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c4192fe9820391676894c7fa8552a56cb63091c8b02a878240d2bc5c6b172b96"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c4192fe9820391676894c7fa8552a56cb63091c8b02a878240d2bc5c6b172b96"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a76de3e5b1f125b534c69a96d404821d4ea5645f3fb5a65fc5d99175b6d767bc"
      SPECSPACE_RELEASE_COMMIT: "6d94f70f4e1176c468cfca26e9fd264e86bc4ce3"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
