name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a874ccd952fc6b2d532af12e45279b83a2f66bfcd69ffce1236dac8780b501f9"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:088a342a64b8fc4ff51f274cd4c597a0943801b945db640d126c709ba64c82e1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:088a342a64b8fc4ff51f274cd4c597a0943801b945db640d126c709ba64c82e1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a874ccd952fc6b2d532af12e45279b83a2f66bfcd69ffce1236dac8780b501f9"
      SPECSPACE_RELEASE_COMMIT: "995531a5e12bbf19ba72cc9726254900b1d18b95"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
