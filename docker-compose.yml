name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:472a33d12ba65cd2cfb6967776d2c598cecadfdb82dbd6405bab36803de0f86b"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2ec153fd559d761d29be31b3dcbc7a7d15adc23a7abad1a7b866d306f5451be3"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2ec153fd559d761d29be31b3dcbc7a7d15adc23a7abad1a7b866d306f5451be3"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:472a33d12ba65cd2cfb6967776d2c598cecadfdb82dbd6405bab36803de0f86b"
      SPECSPACE_RELEASE_COMMIT: "2ed17f80e2fc9b2cec8ef78063a2d62b24d10a00"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
