name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ab6683ade8212d970eafcea23e6d4165930a643bbbdba42016c98cacc0904f4e"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e1907a21422006be4b3e08e113a85ea5b9299fed8bf706f61229a99619fe4af0"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e1907a21422006be4b3e08e113a85ea5b9299fed8bf706f61229a99619fe4af0"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ab6683ade8212d970eafcea23e6d4165930a643bbbdba42016c98cacc0904f4e"
      SPECSPACE_RELEASE_COMMIT: "c6fbdde237ef7ba0c6a1069e9ebc60b374b11329"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
