name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a701022c8e325caaf2b7703be3f200307103a41fd7c86e6407a01634a90734f6"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5326d926f239018293b7298f4494301c66872282234ddfb06527195dfc593d91"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5326d926f239018293b7298f4494301c66872282234ddfb06527195dfc593d91"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a701022c8e325caaf2b7703be3f200307103a41fd7c86e6407a01634a90734f6"
      SPECSPACE_RELEASE_COMMIT: "2d4b1c8d40c08cc381a32a1eeafc018d53b26c89"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
