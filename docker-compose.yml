name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8c3f9b2f46046f0e3cd6f0b5ecbcf6de361e0ba5b24c5be28e3172b507777493"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ff751f236928f17cb739c15d70a272787d302f3da93894e4117f0c06cb195f29"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ff751f236928f17cb739c15d70a272787d302f3da93894e4117f0c06cb195f29"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8c3f9b2f46046f0e3cd6f0b5ecbcf6de361e0ba5b24c5be28e3172b507777493"
      SPECSPACE_RELEASE_COMMIT: "0a5ab340d38bd5cd49b01ba9dadbdaf59f6b4d09"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
