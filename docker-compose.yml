name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ccb01dfa5014a815ff33590488bc34b43a85a0c65f86db2a25d815f170b8b493"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:b252dc0de04cb0ba9b1390d71e6c9f16d2890ef1fe219455dd7ba0bb95fa5c5b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:b252dc0de04cb0ba9b1390d71e6c9f16d2890ef1fe219455dd7ba0bb95fa5c5b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ccb01dfa5014a815ff33590488bc34b43a85a0c65f86db2a25d815f170b8b493"
      SPECSPACE_RELEASE_COMMIT: "0bea2242f8e5ea2ec81358f8176afd2c19eff79b"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
