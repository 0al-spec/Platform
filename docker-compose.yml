name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:88a3d2d433dac420e20c482fd72eb096e8450868b82d5b0bfb14bdc146e2ff9d"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2dbb996b9f1737c8d0df221f5dda94325996b07931c32ab0c5185d1c6b0a8ad8"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2dbb996b9f1737c8d0df221f5dda94325996b07931c32ab0c5185d1c6b0a8ad8"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:88a3d2d433dac420e20c482fd72eb096e8450868b82d5b0bfb14bdc146e2ff9d"
      SPECSPACE_RELEASE_COMMIT: "31007e6244e06398843cc587217bbaa1ee5aa9c2"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
