name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:94e801637a83ea5bc43fd2ad1c6e3a6634f5400d698497826dd4dcd4c9cdec4d"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a484c05176e1b7400714cb110d967ac8af243c7cfe46a3ba61aaed0df3835edc"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a484c05176e1b7400714cb110d967ac8af243c7cfe46a3ba61aaed0df3835edc"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:94e801637a83ea5bc43fd2ad1c6e3a6634f5400d698497826dd4dcd4c9cdec4d"
      SPECSPACE_RELEASE_COMMIT: "9fc823fbc66e05a7d811b77cb00d2ff5944c803d"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
