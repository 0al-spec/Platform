name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8c198d6f749d609b0d7440db1a8c563d8f952dff3ea836dad0ea649f838d98df"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5f3c4cffd273e7f5442ad9990b3e8b73e31566fdbe7438e2bc13031e461fdf1f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5f3c4cffd273e7f5442ad9990b3e8b73e31566fdbe7438e2bc13031e461fdf1f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8c198d6f749d609b0d7440db1a8c563d8f952dff3ea836dad0ea649f838d98df"
      SPECSPACE_RELEASE_COMMIT: "c027de8249de1ee20612d286144bdf04415ec30f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
