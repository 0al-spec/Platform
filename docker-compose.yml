name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:22f2084f900e734d4f83ba29d020ce8367f6edd03dbe3f5c26f3663a2bb93263"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:cc8cfc30a3d60938f2b5b2938ea32f13ae6f4175d6078f9dd6c31cbf42831230"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:cc8cfc30a3d60938f2b5b2938ea32f13ae6f4175d6078f9dd6c31cbf42831230"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:22f2084f900e734d4f83ba29d020ce8367f6edd03dbe3f5c26f3663a2bb93263"
      SPECSPACE_RELEASE_COMMIT: "e5f42c860d48b0a74cde5b0e3fb898aee1fece54"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
