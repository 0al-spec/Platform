name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:71c21a8c2fceae2b72433e21f5e5b9d0761b65207c595b02be3988544a8f44f4"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:eba1fb6d48c36d5755ff4af3aa4406f7181992d87eb27ba3ea99935d7c994519"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:eba1fb6d48c36d5755ff4af3aa4406f7181992d87eb27ba3ea99935d7c994519"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:71c21a8c2fceae2b72433e21f5e5b9d0761b65207c595b02be3988544a8f44f4"
      SPECSPACE_RELEASE_COMMIT: "6570eb8e36fcb3ddc3704c5bdcc97ce4862cea37"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --team-decision-log-artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
