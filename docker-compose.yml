name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c9e2ea32493a54315d60b451fa7378030414eb81e172e58fdc4a3a137949b9e9"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:92ab611808c10f88f03fa19ecdc61eafb596ff013276b5e157d2042fe2838fb3"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:92ab611808c10f88f03fa19ecdc61eafb596ff013276b5e157d2042fe2838fb3"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c9e2ea32493a54315d60b451fa7378030414eb81e172e58fdc4a3a137949b9e9"
      SPECSPACE_RELEASE_COMMIT: "b0aa7228275c3749b5c84267c10119d7c7010af5"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
