name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f8ce13312bdba254db7b98949729266214973b4850d23ea4f257cbe4263238f9"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ca2a522ea6b21f4cdd3d27dee8b02f45ad401fbd8c86185a667f387c21bbd39f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ca2a522ea6b21f4cdd3d27dee8b02f45ad401fbd8c86185a667f387c21bbd39f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f8ce13312bdba254db7b98949729266214973b4850d23ea4f257cbe4263238f9"
      SPECSPACE_RELEASE_COMMIT: "0a4ff815a6045ed667a9bdec68f94ef46e1936af"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
