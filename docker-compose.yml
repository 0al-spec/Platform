name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f67acaa2fb4ce92109cfc7ffdb3f4aee685c0039cff93c883b8a28b88aaf592a"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3365b61e92266482f197809ebe7b6cd5fb61cf703dd958e58d2c345c40da7507"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3365b61e92266482f197809ebe7b6cd5fb61cf703dd958e58d2c345c40da7507"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f67acaa2fb4ce92109cfc7ffdb3f4aee685c0039cff93c883b8a28b88aaf592a"
      SPECSPACE_RELEASE_COMMIT: "0fa1c8266b9abda433b2cfb7e0591bcbd44b9528"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
