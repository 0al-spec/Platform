name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1deecb467c56727eef3fdcc55897f45bbc27a35bee2e7c50ffa923f6c3790e3d"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:20e4894b52254cca8abf27a44caf02780e5bb89221d30cd1b0d3217e8a53bcf4"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:20e4894b52254cca8abf27a44caf02780e5bb89221d30cd1b0d3217e8a53bcf4"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1deecb467c56727eef3fdcc55897f45bbc27a35bee2e7c50ffa923f6c3790e3d"
      SPECSPACE_RELEASE_COMMIT: "9d24d70d7d1e36546be856ba09cf49e2876eeb33"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
