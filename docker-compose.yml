name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:46586a75294b1be7d52be48e72e03aef64a73574ab64e3012baa10e77416d1f4"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:32aecd1f41c27ae748f5e22bcf609fb70bc2f2e3f1ba9d96953f65cbe60448c1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:32aecd1f41c27ae748f5e22bcf609fb70bc2f2e3f1ba9d96953f65cbe60448c1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:46586a75294b1be7d52be48e72e03aef64a73574ab64e3012baa10e77416d1f4"
      SPECSPACE_RELEASE_COMMIT: "e4a6a3438599428b97093002935756d49a2ff4ad"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
