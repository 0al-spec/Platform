name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c781648bbdde0411c7e250d0a0d4a4c95967573b2738a3098fadf378c7e600bd"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:17bf7ef956899fc0494d7d0414cbbe18d0f04d543900ee7f3c9182ddfb16f5bc"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:17bf7ef956899fc0494d7d0414cbbe18d0f04d543900ee7f3c9182ddfb16f5bc"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c781648bbdde0411c7e250d0a0d4a4c95967573b2738a3098fadf378c7e600bd"
      SPECSPACE_RELEASE_COMMIT: "dacde6c5a0b70e54ed0af1f31239b9595524261a"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
