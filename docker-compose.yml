name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:b8f0700dc821b99ae5cb122f1eeb4f490325c8aec5db2e9f56fa358dba59221c"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:df28d5d7037c9bcb0350f104e86aa179e09f10850f86cbf3bc42fe0ae8430680"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:df28d5d7037c9bcb0350f104e86aa179e09f10850f86cbf3bc42fe0ae8430680"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:b8f0700dc821b99ae5cb122f1eeb4f490325c8aec5db2e9f56fa358dba59221c"
      SPECSPACE_RELEASE_COMMIT: "6e79ae6c90c4f1da8803f263584460187b69d404"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
