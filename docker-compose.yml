name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:619ec6624b29da889435cd51e99e931f706781ac97fcf993c846c9d71e5bf622"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:4830f05f6f3a209acf426b894c16ba7651fc3bc9ea5e96c7a3268a394f740f9d"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:4830f05f6f3a209acf426b894c16ba7651fc3bc9ea5e96c7a3268a394f740f9d"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:619ec6624b29da889435cd51e99e931f706781ac97fcf993c846c9d71e5bf622"
      SPECSPACE_RELEASE_COMMIT: "8f5a3d7d460fa672fad699d21e596abcb98980dc"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
