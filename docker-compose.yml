name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:20d7b0859e2a593928829730de3fb077d10e6016474cda182641e7d7b430fe44"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:51c92a821146dcb54330521cd8e56d5ae4b63b3bb1be7ddc7e222f63f9d5b911"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:51c92a821146dcb54330521cd8e56d5ae4b63b3bb1be7ddc7e222f63f9d5b911"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:20d7b0859e2a593928829730de3fb077d10e6016474cda182641e7d7b430fe44"
      SPECSPACE_RELEASE_COMMIT: "0b10db878859d85adee3c9e1f5185c18654a6c4e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
