name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:6961aa9cb9d7c459b80cf259face7a39bda50410f604ba2525b8686ec81f09f3"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:0a422d804047a250e91b3f8f5bc005ef3a3a356cbfd1154029f8d8b48b2ea8c1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:0a422d804047a250e91b3f8f5bc005ef3a3a356cbfd1154029f8d8b48b2ea8c1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:6961aa9cb9d7c459b80cf259face7a39bda50410f604ba2525b8686ec81f09f3"
      SPECSPACE_RELEASE_COMMIT: "eea2b5f874134bd1e43b2f20e2675313a6049372"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
