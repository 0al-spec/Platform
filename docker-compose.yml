name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3f33ff688c73d9253c61dadeac7f5970a719cef2faa27c0f680bcf353f88480a"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:b3e78ca59d9c5c173632c69bf1c6f7d6e53bea6d42d9264def67ac0156512339"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:b3e78ca59d9c5c173632c69bf1c6f7d6e53bea6d42d9264def67ac0156512339"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3f33ff688c73d9253c61dadeac7f5970a719cef2faa27c0f680bcf353f88480a"
      SPECSPACE_RELEASE_COMMIT: "faff3ef0576911fedfd9317753f4db61efefe799"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
