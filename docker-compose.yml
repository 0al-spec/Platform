name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3fd210ed65198b2565f85226abb8deea0186798e221832ed22939820ee7e55c5"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3897511b55baae825172e3f146de12bc4486db0ac6f0d8e41c09efa8981842ba"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3897511b55baae825172e3f146de12bc4486db0ac6f0d8e41c09efa8981842ba"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3fd210ed65198b2565f85226abb8deea0186798e221832ed22939820ee7e55c5"
      SPECSPACE_RELEASE_COMMIT: "fa3902decb6c85526a99969a6a1c47cabb119c2f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
