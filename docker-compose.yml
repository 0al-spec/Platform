name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:126b55ec089dca33ece08e3fa117c2d5f5da7a4e6bfa10f11c03edf2ca4eac2f"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:72fd3a1a2ca03e3f67e048f7af40ee714242695ef8b5ca26e73fc7c13781dd80"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:72fd3a1a2ca03e3f67e048f7af40ee714242695ef8b5ca26e73fc7c13781dd80"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:126b55ec089dca33ece08e3fa117c2d5f5da7a4e6bfa10f11c03edf2ca4eac2f"
      SPECSPACE_RELEASE_COMMIT: "715c1eefa7a7a7ad35c6c97ef27d9394421b6659"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
