name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:fcb6a9862cba649ba51f9c167c8e0e60400a367a8046a7b9750d8a1064581c77"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:83e14576cee952a229a7cde18d296464ed930ca0e910a30ecb0ed1983329ca2d"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:83e14576cee952a229a7cde18d296464ed930ca0e910a30ecb0ed1983329ca2d"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:fcb6a9862cba649ba51f9c167c8e0e60400a367a8046a7b9750d8a1064581c77"
      SPECSPACE_RELEASE_COMMIT: "703aac5c5b94fff8906a9511efced2d993568f78"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
