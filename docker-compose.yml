name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ae4decff569c418c0eb3c198885604fe02e88626613aa2c69bbffb15f0a3711b"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9455e8a340ac1351758c69a6d8df6b470c194227f37a8334b3ad708261db3968"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9455e8a340ac1351758c69a6d8df6b470c194227f37a8334b3ad708261db3968"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ae4decff569c418c0eb3c198885604fe02e88626613aa2c69bbffb15f0a3711b"
      SPECSPACE_RELEASE_COMMIT: "1996d7c9a6dfdbd79235dbc2ca69df3ec29eca65"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
