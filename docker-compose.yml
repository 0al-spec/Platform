name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:94050310519e5cfdd74bf0440dd9f77e9e2723d531d8d7e55444387d69cb9214"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:19880a5bfe64c8c21b9127e19f4de7e54fcc5ea829a4b240c5b9b5f96d2367c5"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:19880a5bfe64c8c21b9127e19f4de7e54fcc5ea829a4b240c5b9b5f96d2367c5"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:94050310519e5cfdd74bf0440dd9f77e9e2723d531d8d7e55444387d69cb9214"
      SPECSPACE_RELEASE_COMMIT: "615e597d9b0b5ad9b9972e2c900ad00141ff076d"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
