name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:52536d27be6063f7a27211c9c4b5b34e0f9676a1c3cac9dd0032d7c374a204a1"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:52e605323558b24f5f9068fb7e6f6e370461cede082e719d30f436d36e19cb42"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:52e605323558b24f5f9068fb7e6f6e370461cede082e719d30f436d36e19cb42"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:52536d27be6063f7a27211c9c4b5b34e0f9676a1c3cac9dd0032d7c374a204a1"
      SPECSPACE_RELEASE_COMMIT: "d4aa0ce891cf6d000e7e512b7906f45cf9ab3599"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
