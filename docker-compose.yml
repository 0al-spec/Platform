name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c800b4e274cdaf23672733fa652cef15c807b8b472a6cb4746a078673bb73814"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:314002d3249bbb5e508068acaa8695d5ae8be0bdd4cdab4f568bef16f8b83c47"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:314002d3249bbb5e508068acaa8695d5ae8be0bdd4cdab4f568bef16f8b83c47"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c800b4e274cdaf23672733fa652cef15c807b8b472a6cb4746a078673bb73814"
      SPECSPACE_RELEASE_COMMIT: "4710df25d20ec2a7394212fc448708326e77e54b"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
