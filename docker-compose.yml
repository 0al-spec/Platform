name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8c0cda358d3ea4dfccaa2c85de39224caff65bf9dcb28c8c73b996059d1fc360"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:20d0d12ec549ef75f592b0336039c892d1707b88bf34c046123c23ce4726d33b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:20d0d12ec549ef75f592b0336039c892d1707b88bf34c046123c23ce4726d33b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8c0cda358d3ea4dfccaa2c85de39224caff65bf9dcb28c8c73b996059d1fc360"
      SPECSPACE_RELEASE_COMMIT: "2601b98999d620d1d4b56473cf5086a4dfe96e8f"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
