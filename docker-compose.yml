name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:5f8ccaabccfee4d6afc57fd7191436e3915ffef82c0c737d4786e5e555f50cdf"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c0c3ed2912e0fe7e3991dd0f92b2a4b9175832e0e5729b329c13fef1ad658f0e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c0c3ed2912e0fe7e3991dd0f92b2a4b9175832e0e5729b329c13fef1ad658f0e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:5f8ccaabccfee4d6afc57fd7191436e3915ffef82c0c737d4786e5e555f50cdf"
      SPECSPACE_RELEASE_COMMIT: "b002c51c2a9f35645f31ce189e6e4668e1a5448c"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
