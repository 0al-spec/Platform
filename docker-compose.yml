name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:603e48e8125377c8c83f387a2f81bf918d6c91c1f71bb9710863933823b11ec8"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:f1af7e5488222f6d303bc033513060860482e377c3d703b9b9d95afdbb1e4bf6"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:f1af7e5488222f6d303bc033513060860482e377c3d703b9b9d95afdbb1e4bf6"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:603e48e8125377c8c83f387a2f81bf918d6c91c1f71bb9710863933823b11ec8"
      SPECSPACE_RELEASE_COMMIT: "036c31861dfff35c2e73dc5bd5a6dc0d8f19be61"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "hosted-operation-canary=https://specgraph.tech/workspaces/hosted-operation-canary"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
