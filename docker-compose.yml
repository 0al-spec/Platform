name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:e15b029d40c11f4334b9252397043477c3e0b4903dc4c2cc2d9bad4465f70398"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:aa8aeece3ee08f74d06318ce508398ea75e19c80a0bee585a062d0f29b948bfe"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:aa8aeece3ee08f74d06318ce508398ea75e19c80a0bee585a062d0f29b948bfe"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:e15b029d40c11f4334b9252397043477c3e0b4903dc4c2cc2d9bad4465f70398"
      SPECSPACE_RELEASE_COMMIT: "6bd755df55885b3db009d2cb81d2ce6b529e97c4"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
