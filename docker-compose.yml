name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:36a16dbdf3bfccf791cc81e0f768a401daa0801786e19c8b41c2b350c9adddaf"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:610be80bb5d04c8282653a05269e8cb425a31af85b4c40453e4385aab1bfc139"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:610be80bb5d04c8282653a05269e8cb425a31af85b4c40453e4385aab1bfc139"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:36a16dbdf3bfccf791cc81e0f768a401daa0801786e19c8b41c2b350c9adddaf"
      SPECSPACE_RELEASE_COMMIT: "1b00c09f5452dfb3028aa2732d2c771acc1749ba"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
