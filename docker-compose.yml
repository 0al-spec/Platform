name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:415fbb606be5c9f4073c465d8a1d60abdd3cb50542bc7f730c3b350d47bd0c95"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:01ed240437bf241ad47257f02260d46ca6888016cc6b2e921c0d0dc9345c5897"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:01ed240437bf241ad47257f02260d46ca6888016cc6b2e921c0d0dc9345c5897"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:415fbb606be5c9f4073c465d8a1d60abdd3cb50542bc7f730c3b350d47bd0c95"
      SPECSPACE_RELEASE_COMMIT: "f28a0cdac2da005fed3ea5672f75c69879618edc"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
