name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:15ef1274fbb8e02aa1d3af0c4b3b52ffd32d3396d7bfc1c3a7353d531c71411a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:fa22dba89065f5e2fc2e6448d5392a6b9d2af6f5f537b4f6cd7ee3fe27dbaa17"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:fa22dba89065f5e2fc2e6448d5392a6b9d2af6f5f537b4f6cd7ee3fe27dbaa17"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:15ef1274fbb8e02aa1d3af0c4b3b52ffd32d3396d7bfc1c3a7353d531c71411a"
      SPECSPACE_RELEASE_COMMIT: "8a3b6f7f8d5241ec821b587ad02264b40334378e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
