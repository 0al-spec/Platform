name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:2d9803971b78265f8d7249cdc6cc176d7987a24500a0650459416f24f4707236"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:1ed5c04c0aaf7a7bc0d7c09a7c473a8774c0357351b4f411e072c97c464df299"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:1ed5c04c0aaf7a7bc0d7c09a7c473a8774c0357351b4f411e072c97c464df299"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:2d9803971b78265f8d7249cdc6cc176d7987a24500a0650459416f24f4707236"
      SPECSPACE_RELEASE_COMMIT: "3049db9ca14066d9978cf36c552290843aec36c0"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
