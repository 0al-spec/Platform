name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:05460d6ff2a517be922cf06a3331e5ae4eb2357e41f3764d1f107068df3ca66b"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:da6fe884b12f790359474e6796fb6349097fb1fe3e2cbf8daf08acb4a7e3e958"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:da6fe884b12f790359474e6796fb6349097fb1fe3e2cbf8daf08acb4a7e3e958"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:05460d6ff2a517be922cf06a3331e5ae4eb2357e41f3764d1f107068df3ca66b"
      SPECSPACE_RELEASE_COMMIT: "37bcd09ac4cf65461a6c7c04488fb39b58b26370"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
