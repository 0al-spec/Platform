name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:9170b11b599ad64af55d6deea15da2f4cfc59993fa6262eb00bbd683c363b52a"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:fa1e1af903c16bde419595eaf1a4f572e6eb7eb4faa6950063bea43b865258e6"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:fa1e1af903c16bde419595eaf1a4f572e6eb7eb4faa6950063bea43b865258e6"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:9170b11b599ad64af55d6deea15da2f4cfc59993fa6262eb00bbd683c363b52a"
      SPECSPACE_RELEASE_COMMIT: "075e4e4fe72912338b924d34ae2ffeb6bbf0af68"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
