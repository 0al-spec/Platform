name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7d693cab6b59d5d2ac806d31ce020ef61f75d2413c0ec00a887111b2b506615a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:118b6392b38adc5f5418740f816ab0961ec9e00367a5236cc7d0134bef731135"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:118b6392b38adc5f5418740f816ab0961ec9e00367a5236cc7d0134bef731135"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7d693cab6b59d5d2ac806d31ce020ef61f75d2413c0ec00a887111b2b506615a"
      SPECSPACE_RELEASE_COMMIT: "4d64c080a7d4c2acde0652acb26469f9cfc98492"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
