name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:413eba955bf210beaed7b01151add6c0cd0d5e9ac46b00ac6665c2241becb729"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:21000ef42d913d6b6329d4c2c57edbfb6581a98f00f46deafc73d855e3fd08e5"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:21000ef42d913d6b6329d4c2c57edbfb6581a98f00f46deafc73d855e3fd08e5"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:413eba955bf210beaed7b01151add6c0cd0d5e9ac46b00ac6665c2241becb729"
      SPECSPACE_RELEASE_COMMIT: "5483db4544c62b59e617663a5c63ca815dc4e32e"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
