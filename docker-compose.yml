name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:193641db867d9cf201bf2e042d8d5bc0a5dd2bfc45389f897c0abf59aef72aaf"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c40155972d99660bc0d668dcef2f99cda386846a50bf4efe4f0025b46a99c8b0"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c40155972d99660bc0d668dcef2f99cda386846a50bf4efe4f0025b46a99c8b0"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:193641db867d9cf201bf2e042d8d5bc0a5dd2bfc45389f897c0abf59aef72aaf"
      SPECSPACE_RELEASE_COMMIT: "90ad96764cd91fcab0ad36d20fccc85a07afc5f5"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
