name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:d4e6dd8eb056270a3ac5f9045e95fb20409974a95ccdde583496db2f16da440c"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:418f469bb07fc46382f76af69a6dc93d226de7c542bfa0fbbccf6ec383c94e7d"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:418f469bb07fc46382f76af69a6dc93d226de7c542bfa0fbbccf6ec383c94e7d"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:d4e6dd8eb056270a3ac5f9045e95fb20409974a95ccdde583496db2f16da440c"
      SPECSPACE_RELEASE_COMMIT: "976cad61bebd469995a39c2621309fe6cbfeaac1"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
