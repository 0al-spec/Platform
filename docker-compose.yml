name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c5fb064b0de6079d4d6664b273dbcefa2c4085cbfac3fe83d03fa2400a7045a0"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:1b659325d87950a12225b8acf2142883d83ab3b993a4727e76b10e1958cb20e4"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:1b659325d87950a12225b8acf2142883d83ab3b993a4727e76b10e1958cb20e4"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c5fb064b0de6079d4d6664b273dbcefa2c4085cbfac3fe83d03fa2400a7045a0"
      SPECSPACE_RELEASE_COMMIT: "0ccddb185752de9b13c82c7ee01ae57f69444025"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
