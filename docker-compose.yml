name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3cc858ec0f9d9a2853adf6af1da0c87c44cb5c97437be55419b891d55654fb55"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:40b4fbc6f199b1e37c36b78258e4c3015e1acd0ba7c4df75aea6eab91937e178"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:40b4fbc6f199b1e37c36b78258e4c3015e1acd0ba7c4df75aea6eab91937e178"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3cc858ec0f9d9a2853adf6af1da0c87c44cb5c97437be55419b891d55654fb55"
      SPECSPACE_RELEASE_COMMIT: "854aa5ff18a6454fce38999493e5d7ffc10f19b6"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
