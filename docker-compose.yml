name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:63c6ae435c649295d1b29b57477a37bfcf05f053090e019b9f2f8f55af6475f0"
    ports:
      - "8080:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2fc6bd475564190bf8394368401aa7eaa0b31c39680709544d0e0177b2e936fc"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2fc6bd475564190bf8394368401aa7eaa0b31c39680709544d0e0177b2e936fc"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:63c6ae435c649295d1b29b57477a37bfcf05f053090e019b9f2f8f55af6475f0"
      SPECSPACE_RELEASE_COMMIT: "f2ba31ff9fe3b623e46431f895bd6ef5e6728af0"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech/workspaces/team-decision-log"
      - --specpm-registry-url
      - "https://specpm.dev"
    expose:
      - "8001"
