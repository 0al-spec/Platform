name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:99266237c1b4c4d7f5cce5361be72359c4dc7f836d35d8f1d1ec63f40a187d80"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:f5c94bf69afc691349eddbbc98ac0221e88fc3e4f557fa97db6d3b312a6596d7"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:f5c94bf69afc691349eddbbc98ac0221e88fc3e4f557fa97db6d3b312a6596d7"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:99266237c1b4c4d7f5cce5361be72359c4dc7f836d35d8f1d1ec63f40a187d80"
      SPECSPACE_RELEASE_COMMIT: "ce07718666d799abedab281592cbbf6114f10262"
      SPECSPACE_HYPERPROMPT_HTTP_COMPILE_ENABLED: "true"
      SPECSPACE_HYPERPROMPT_WORK_DIR: "/tmp"
      SPECSPACE_HYPERPROMPT_COMPILE_TIMEOUT_SECONDS: "60"
      SPECSPACE_HYPERPROMPT_MAX_INPUT_BYTES: "1048576"
      SPECSPACE_HYPERPROMPT_MAX_OUTPUT_BYTES: "2097152"
      SPECSPACE_HYPERPROMPT_BUNDLE_RETENTION_COUNT: "20"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --product-workspace-artifact-base-url
      - "team-decision-log=https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
